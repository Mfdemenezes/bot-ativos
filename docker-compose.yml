services:
  api:
    build: .
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - db
    volumes:
      - ./watchlist.json:/app/watchlist.json

  scheduler:
    build: .
    restart: unless-stopped
    command: python scheduler.py
    env_file: .env
    depends_on:
      - db
    volumes:
      - ./watchlist.json:/app/watchlist.json

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: bot_ativos
      POSTGRES_USER: bot
      POSTGRES_PASSWORD: ${DB_PASSWORD:-botpass}
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
